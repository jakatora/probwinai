# Codzienny refresh - generuje statyczne JSON do docs/data/ i commituje do main.
# GitHub Pages serwuje docs/ jako https://[user].github.io/[repo]/
#
# Sekrety potrzebne (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY  - klucz Claude API (opcjonalnie, bez = mock commentary)
#   ODDS_API_KEY       - klucz the-odds-api.com (opcjonalnie, bez = mock matches)
#
# Workflow ma prawa zapisu do repo (GITHUB_TOKEN domyslnie ma write).

name: Daily refresh

on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC = 08:00 CEST
  workflow_dispatch:        # mozliwosc recznego trigger z UI

permissions:
  contents: write           # potrzebne do git push

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # pelna historia - inaczej push bedzie odrzucany

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate static JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/export_static_json.py --top 10

      - name: Commit changes
        run: |
          git config user.name "ProbWin AI Bot"
          git config user.email "bot@probwinai.app"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily refresh: $(date -u +%Y-%m-%d)"
            git push origin main
          fi
