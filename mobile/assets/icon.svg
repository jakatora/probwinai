<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- ProbWin AI - app icon (placeholder, podmien na finalna grafike) -->
  <!-- Background -->
  <rect width="1024" height="1024" rx="240" fill="#0F1419"/>

  <!-- Probability bars visualization -->
  <g transform="translate(192, 296)">
    <!-- Bar 1 (P) -->
    <rect x="0" y="320" width="160" height="120" rx="20" fill="#60A5FA"/>
    <!-- Bar 2 (X) -->
    <rect x="240" y="200" width="160" height="240" rx="20" fill="#4ADE80"/>
    <!-- Bar 3 (W) -->
    <rect x="480" y="80" width="160" height="360" rx="20" fill="#60A5FA"/>
  </g>

  <!-- 'P' letter overlay -->
  <text x="512" y="800" font-family="-apple-system, sans-serif" font-size="240" font-weight="900" fill="#E6EDF3" text-anchor="middle">P</text>
</svg>
