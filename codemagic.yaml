# Codemagic CI/CD configuration dla ProbWin AI
#
# Setup:
# 1. Stworz konto na codemagic.io (darmowo 500 min/mies)
# 2. Podlacz GitHub repo z tym projektem
# 3. W Codemagic UI: dodaj Apple Developer credentials (App Store Connect API key)
# 4. Trigger: push do brancha 'main' -> automatyczny build iOS

workflows:
  # ===========================================================================
  # iOS build dla App Store
  # ===========================================================================
  ios-release:
    name: iOS Release (App Store)
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: ProbWin AI Connect Key  # nazwa Connect API key dodanego w Codemagic UI

    environment:
      # UWAGA: NIE deklarujemy 'ios_signing:' bloku - wykonuje on automatyczny
      # pre-check ktory wywala 'No matching profiles found' zanim nasze
      # skrypty zdaza utworzyc profile. Zamiast tego wszystko robia
      # 'app-store-connect fetch-signing-files --create' i 'xcode-project use-profiles'.
      vars:
        # Team ID z developer.apple.com (Krzysztof Kapusta)
        APPLE_TEAM_ID: B7J6A7R258
        BUNDLE_ID: com.probwinai.app
        # WAZNE: sciezki relatywne do mobile/ - tam jest Flutter project
        XCODE_WORKSPACE: "mobile/ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: 3.24.5     # pinned, cached na Codemagic runners - unika timeoutu downloadu
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up Flutter (recreate missing iOS scaffolding)
        script: |
          set -ex
          cd mobile
          # flutter create dorabia brakujace pliki iOS (Runner.xcodeproj, Podfile, frameworki).
          flutter create --platforms=ios . --project-name probwin_ai --org com.probwinai

          # Flutter wygenerowal bundle ID com.probwinai.probwinAi (org+camelCase(name)).
          # NASZ wlasciwy bundle ID to com.probwinai.app (zgodny z Apple Bundle ID + AppStore Connect).
          # Podmieniamy w pbxproj zeby xcode-project use-profiles znalazl matching profile.
          sed -i '' 's/com\.probwinai\.probwinAi/com.probwinai.app/g' ios/Runner.xcodeproj/project.pbxproj
          # Weryfikacja
          grep -c "com.probwinai.app" ios/Runner.xcodeproj/project.pbxproj
          grep -c "com.probwinai.probwinAi" ios/Runner.xcodeproj/project.pbxproj || echo "OK: brak starych referencji"

          flutter pub get

      - name: Set up code signing (cert + provisioning profile auto-create)
        script: |
          set -ex
          # 1. Inicjuj pek kluczy budowy
          keychain initialize

          # 2. Wygeneruj klucz prywatny RSA 2048 dla CSR
          PRIVATE_KEY_PATH="$HOME/probwinai_cert_key.pem"
          openssl genrsa -out "$PRIVATE_KEY_PATH" 2048
          chmod 600 "$PRIVATE_KEY_PATH"

          # 3. Pobierz lub utworz Distribution cert + App Store profile.
          # Codemagic CLI: @file:PATH = wczytaj sciezka, @env:VAR = z env var.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:"$PRIVATE_KEY_PATH"

          # 4. Zaladuj certyfikat + klucz prywatny do keychain
          keychain add-certificates

          # 5. Zastosuj profile do Flutter iOS project (z mobile/ - tam jest Runner.xcodeproj)
          cd "$CM_BUILD_DIR/mobile"
          xcode-project use-profiles
          # Pokaz co zostalo zastosowane
          xcode-project detect-bundle-id || true

      - name: Install pods
        script: |
          cd mobile/ios
          pod install

      - name: Generate icons & splash (jezeli sa assety)
        script: |
          cd mobile
          flutter pub run flutter_launcher_icons || echo "Icons skipped (no assets/icon.png)"
          flutter pub run flutter_native_splash:create || echo "Splash skipped"

      - name: Build IPA
        script: |
          set -ex
          cd mobile
          # PROBWIN_API_URL fallback na produkcyjny URL z GitHub Pages
          API_URL="${PROBWIN_API_URL:-https://jakatora.github.io/probwinai/data}"
          # Plist export_options.plist jest w repo (mobile/ios/export_options.plist)
          flutter build ipa \
            --release \
            --build-name=0.1.0 \
            --build-number=$(($BUILD_NUMBER + 100)) \
            --dart-define=API_URL="$API_URL" \
            --export-options-plist=ios/export_options.plist

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false  # Recznie zatwierdzasz w Connect
        beta_groups:
          - "Internal Testers"

  # ===========================================================================
  # Android build dla Google Play (mozesz tez buildowac lokalnie na Windows)
  # ===========================================================================
  android-release:
    name: Android Release (Google Play)
    instance_type: mac_mini_m1
    max_build_duration: 60

    environment:
      android_signing:
        - probwinai_keystore  # nazwa keystore uploadanego w Codemagic UI
      groups:
        - google_credentials  # zawiera GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        PACKAGE_NAME: "com.probwinai.app"
      flutter: 3.24.5     # pinned, cached na Codemagic runners - unika timeoutu downloadu

    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/mobile/android/local.properties"

      - name: Get Flutter packages
        script: |
          cd mobile
          flutter pub get

      - name: Build AAB
        script: |
          cd mobile
          flutter build appbundle \
            --release \
            --build-name=0.1.0 \
            --build-number=$(($BUILD_NUMBER + 100)) \
            --dart-define=API_URL=$PROBWIN_API_URL

    artifacts:
      - mobile/build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal  # internal/alpha/beta/production
