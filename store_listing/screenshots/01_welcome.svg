<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <!-- iPhone 6.7" screen mockup - Welcome screen z responsible gambling notice -->
  <defs>
    <style>
      .bg { fill: #0F1419; }
      .panel { fill: #1A212A; }
      .panel-blue { fill: rgba(96, 165, 250, 0.08); }
      .panel-yellow { fill: rgba(251, 191, 36, 0.08); }
      .panel-red { fill: rgba(248, 113, 113, 0.08); }
      .text-main { fill: #E6EDF3; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
      .text-dim { fill: #8B9BAB; font-family: -apple-system, sans-serif; }
      .text-blue { fill: #60A5FA; font-family: -apple-system, sans-serif; }
      .text-yellow { fill: #FBBF24; font-family: -apple-system, sans-serif; }
      .text-red { fill: #F87171; font-family: -apple-system, sans-serif; }
      .border-blue { stroke: #60A5FA; }
      .border-yellow { stroke: #FBBF24; }
      .border-red { stroke: #F87171; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1290" height="2796" class="bg"/>

  <!-- Status bar (iPhone Dynamic Island) -->
  <rect x="491" y="40" width="307" height="124" rx="62" fill="#000"/>
  <text x="100" y="100" class="text-main" font-size="36" font-weight="600">9:41</text>
  <g transform="translate(1090, 80)">
    <rect x="0" y="0" width="55" height="32" rx="6" stroke="#E6EDF3" stroke-width="2" fill="none"/>
    <rect x="6" y="6" width="40" height="20" rx="2" fill="#E6EDF3"/>
  </g>

  <!-- Banner: Marketing tagline (gora screenshotu) -->
  <rect x="0" y="200" width="1290" height="180" fill="#1A212A"/>
  <text x="645" y="270" class="text-blue" font-size="32" font-weight="600" text-anchor="middle">PRYWATNOSC + ODPOWIEDZIALNOSC</text>
  <text x="645" y="340" class="text-main" font-size="60" font-weight="800" text-anchor="middle">Zero zbieranych danych</text>

  <!-- App content starts -->
  <g transform="translate(80, 460)">
    <!-- Icon -->
    <g transform="translate(525, 0)">
      <rect width="120" height="120" rx="28" fill="#0F1419" stroke="#60A5FA" stroke-width="2"/>
      <g transform="translate(20, 35)">
        <rect x="0" y="40" width="22" height="40" rx="4" fill="#3B82F6"/>
        <rect x="30" y="20" width="22" height="60" rx="4" fill="#22C55E"/>
        <rect x="60" y="0" width="22" height="80" rx="4" fill="#F59E0B"/>
      </g>
    </g>

    <!-- App name -->
    <text x="565" y="200" class="text-main" font-size="68" font-weight="800" text-anchor="middle">ProbWin AI</text>
    <text x="565" y="260" class="text-dim" font-size="34" text-anchor="middle">Football statistics &amp; AI insight</text>

    <!-- Card 1: Czym jest -->
    <g transform="translate(0, 340)">
      <rect width="1130" height="240" rx="16" class="panel-blue"/>
      <rect x="0" y="0" width="6" height="240" fill="#60A5FA"/>
      <text x="60" y="60" class="text-blue" font-size="28" font-weight="700">CZYM JEST PROBWIN AI</text>
      <text x="60" y="120" class="text-main" font-size="36">
        <tspan x="60" dy="0">Aplikacja prezentuje statystyki sportowe</tspan>
        <tspan x="60" dy="50">i obliczone matematycznie prawdopodobienstwa</tspan>
        <tspan x="60" dy="50">wynikow meczow. AI dostarcza komentarz.</tspan>
      </text>
    </g>

    <!-- Card 2: Czym NIE jest -->
    <g transform="translate(0, 620)">
      <rect width="1130" height="240" rx="16" class="panel-yellow"/>
      <rect x="0" y="0" width="6" height="240" fill="#FBBF24"/>
      <text x="60" y="60" class="text-yellow" font-size="28" font-weight="700">CZYM NIE JEST</text>
      <text x="60" y="120" class="text-main" font-size="36">
        <tspan x="60" dy="0">Aplikacja NIE rekomenduje zakladow,</tspan>
        <tspan x="60" dy="50">NIE gwarantuje zyskow, NIE jest powiazana</tspan>
        <tspan x="60" dy="50">z zadnym bukmacherem.</tspan>
      </text>
    </g>

    <!-- Card 3: Hazard moze uzalezniac -->
    <g transform="translate(0, 900)">
      <rect width="1130" height="280" rx="16" class="panel-red"/>
      <rect x="0" y="0" width="6" height="280" fill="#F87171"/>
      <text x="60" y="60" class="text-red" font-size="28" font-weight="700">HAZARD MOZE UZALEZNIAC</text>
      <text x="60" y="120" class="text-main" font-size="36">
        <tspan x="60" dy="0">Jesli grasz w zaklady, rob to odpowiedzialnie.</tspan>
        <tspan x="60" dy="50">Bezplatna pomoc w Polsce:</tspan>
      </text>
      <text x="60" y="240" class="text-blue" font-size="40" font-weight="700" text-decoration="underline">tel. 801 199 990</text>
    </g>

    <!-- Checkboxes -->
    <g transform="translate(20, 1240)">
      <rect x="0" y="0" width="48" height="48" rx="6" stroke="#4ADE80" stroke-width="3" fill="#4ADE80"/>
      <path d="M 12 24 L 22 34 L 38 14" stroke="#0F1419" stroke-width="5" fill="none" stroke-linecap="round"/>
      <text x="80" y="38" class="text-main" font-size="36">Potwierdzam, ze mam ukonczone 18 lat</text>
    </g>

    <g transform="translate(20, 1320)">
      <rect x="0" y="0" width="48" height="48" rx="6" stroke="#4ADE80" stroke-width="3" fill="#4ADE80"/>
      <path d="M 12 24 L 22 34 L 38 14" stroke="#0F1419" stroke-width="5" fill="none" stroke-linecap="round"/>
      <text x="80" y="38" class="text-main" font-size="36">
        <tspan>Akceptuje </tspan>
        <tspan class="text-blue" text-decoration="underline">regulamin i polityke prywatnosci</tspan>
      </text>
    </g>

    <!-- CTA Button -->
    <g transform="translate(0, 1460)">
      <rect width="1130" height="120" rx="16" fill="#60A5FA"/>
      <text x="565" y="80" fill="#0F1419" font-size="44" font-weight="700" text-anchor="middle" font-family="-apple-system, sans-serif">Kontynuuj</text>
    </g>
  </g>

  <!-- Home indicator (iPhone) -->
  <rect x="495" y="2730" width="300" height="14" rx="7" fill="#E6EDF3" opacity="0.5"/>
</svg>
