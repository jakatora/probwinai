          <text x="32" y="46" class="text-green" font-size="32" font-weight="800" text-anchor="middle">W</text>
        </g>
        <g transform="translate(160, 0)">
          <rect width="64" height="64" rx="8" fill="rgba(251, 191, 36, 0.2)"/>
          <text x="32" y="46" class="text-yellow" font-size="32" font-weight="800" text-anchor="middle">D</text>
        </g>
        <g transform="translate(240, 0)">
          <rect width="64" height="64" rx="8" fill="rgba(248, 113, 113, 0.2)"/>
          <text x="32" y="46" class="text-red" font-size="32" font-weight="800" text-anchor="middle">L</text>
