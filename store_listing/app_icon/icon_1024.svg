<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Tlo: ciemny gradient (Apple wymaga pelne tlo, nie przezroczyste) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#1A2333"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Tlo z zaokraglonymi rogami (App Store automatycznie maskuje, ale dajemy pelny squircle) -->
  <rect width="1024" height="1024" rx="240" fill="url(#bg)"/>

  <!-- Trzy paski prawdopodobienstwa (rosnaca tendencja) -->
  <g transform="translate(192, 280)">
    <rect x="0"   y="280" width="180" height="200" rx="24" fill="url(#bar1)" opacity="0.85"/>
    <rect x="240" y="160" width="180" height="320" rx="24" fill="url(#bar2)" opacity="0.95"/>
    <rect x="480" y="40"  width="180" height="440" rx="24" fill="url(#bar3)"/>
  </g>

  <!-- Litera "P" jako mark (na dole, integralna czesc ikony) -->
  <g transform="translate(512, 820)">
    <text x="0" y="0"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="160"
          font-weight="900"
          fill="#E6EDF3"
          text-anchor="middle"
          letter-spacing="-4">P</text>
    <text x="0" y="0"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
          font-size="160"
          font-weight="900"
          fill="none"
          stroke="#60A5FA"
          stroke-width="2"
          text-anchor="middle"
          letter-spacing="-4"
          opacity="0.5">P</text>
  </g>
</svg>
