# Fly.io deployment config - alternatywa dla Railway
# Deploy: fly launch (pierwszy raz) potem fly deploy
#
# Fly.io daje:
#   - Darmowe 3 maszyny shared-cpu-1x (256MB RAM)
#   - Globalna sieć edge
#   - Persistent volumes
#   - HTTPS out of the box

app = "probwinai-api"
primary_region = "waw"   # Warszawa - najnizsza latencja dla PL

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  API_HOST = "0.0.0.0"
  DATABASE_PATH = "/data/probwin.sqlite"
  ELO_CACHE_PATH = "/data/elo_cache.json"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"      # oszczedzanie kredytu
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[mounts]]
  source = "probwinai_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
